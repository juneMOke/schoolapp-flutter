name: Build Android

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      build_type:
        description: 'Type de build'
        required: true
        type: choice
        default: apk
        options:
          - apk
          - appbundle
      version_tag:
        description: 'Tag SemVer à utiliser pour prod (ex: v1.2.3)'
        required: false
        type: string
      distribute_firebase:
        description: 'Distribuer via Firebase App Distribution (démo)'
        required: false
        type: boolean
        default: false

  # Déclenchement automatique sur develop → build dev
  push:
    branches: [ develop ]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1 — Résoudre les variables selon l'environnement
  # ─────────────────────────────────────────────────────────────────
  resolve-config:
    name: Resolve config
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    outputs:
      app_env: ${{ steps.config.outputs.app_env }}
      flavor: ${{ steps.config.outputs.flavor }}
    steps:
      - name: Resolve environment variables
        id: config
        run: |
          # Détermine l'environnement : input manuel OU auto sur develop → dev
          ENV="${{ inputs.environment }}"
          if [[ -z "$ENV" ]]; then
            ENV="dev"
          fi

          case "$ENV" in
            dev)
              ;;
            staging)
              ;;
            prod)
              ;;
          esac

          echo "app_env=$ENV"       >> "$GITHUB_OUTPUT"
          echo "flavor=$ENV"         >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────
  # Job 2 — Validation fail-fast
  # ─────────────────────────────────────────────────────────────────
  validate-env:
    name: Validate env (${{ needs.resolve-config.outputs.app_env }})
    needs: resolve-config
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-config.outputs.app_env }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve API base URL
        run: |
          case "${{ needs.resolve-config.outputs.app_env }}" in
            dev)
              echo "API_BASE_URL=${{ secrets.DEV_API_BASE_URL }}" >> "$GITHUB_ENV"
              ;;
            staging)
              echo "API_BASE_URL=${{ secrets.STAGING_API_BASE_URL }}" >> "$GITHUB_ENV"
              ;;
            prod)
              echo "API_BASE_URL=${{ secrets.PROD_API_BASE_URL }}" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Validate environment variables
        run: |
          bash scripts/validate_env.sh \
            --env="${{ needs.resolve-config.outputs.app_env }}" \
            --api-base-url="$API_BASE_URL"

  # ─────────────────────────────────────────────────────────────────
  # Job 3 — Build Android
  # ─────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android ${{ needs.resolve-config.outputs.flavor }} (${{ inputs.build_type || 'apk' }})
    needs: [ resolve-config, validate-env ]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-config.outputs.app_env }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Resolve API base URL
        run: |
          case "${{ needs.resolve-config.outputs.app_env }}" in
            dev)
              echo "API_BASE_URL=${{ secrets.DEV_API_BASE_URL }}" >> "$GITHUB_ENV"
              ;;
            staging)
              echo "API_BASE_URL=${{ secrets.STAGING_API_BASE_URL }}" >> "$GITHUB_ENV"
              ;;
            prod)
              echo "API_BASE_URL=${{ secrets.PROD_API_BASE_URL }}" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Require version tag for prod
        if: ${{ needs.resolve-config.outputs.app_env == 'prod' && inputs.version_tag == '' }}
        run: |
          echo "Un version_tag est requis pour un build prod (ex: v1.2.3)."
          exit 1

      - name: Resolve Flutter version
        id: version
        env:
          APP_ENV: ${{ needs.resolve-config.outputs.app_env }}
          VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < <(bash scripts/resolve_flutter_version.sh --env "$APP_ENV" --version-tag "$VERSION_TAG")

      - name: Prepare Android release signing
        if: ${{ needs.resolve-config.outputs.app_env == 'prod' || inputs.build_type == 'appbundle' }}
        uses: ./.github/actions/prepare-android-signing
        with:
          android_release_keystore_base64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          android_keystore_password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          android_key_alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          android_key_password: ${{ secrets.ANDROID_KEY_PASSWORD }}
          key_properties_path: android/key.properties

      - name: Build APK
        if: ${{ inputs.build_type == 'apk' || inputs.build_type == '' }}
        run: |
          if [[ "${{ needs.resolve-config.outputs.app_env }}" == "prod" ]]; then
            flutter build apk \
              --flavor "${{ needs.resolve-config.outputs.flavor }}" \
              --release \
              --build-name "${{ steps.version.outputs.build_name }}" \
              --build-number "${{ steps.version.outputs.build_number }}" \
              --dart-define=APP_ENV="${{ needs.resolve-config.outputs.app_env }}" \
              --dart-define=API_BASE_URL="$API_BASE_URL"
          else
            flutter build apk \
              --flavor "${{ needs.resolve-config.outputs.flavor }}" \
              --debug \
              --build-name "${{ steps.version.outputs.build_name }}" \
              --build-number "${{ steps.version.outputs.build_number }}" \
              --dart-define=APP_ENV="${{ needs.resolve-config.outputs.app_env }}" \
              --dart-define=API_BASE_URL="$API_BASE_URL"
          fi

      - name: Build App Bundle
        if: ${{ inputs.build_type == 'appbundle' }}
        run: |
          flutter build appbundle \
            --flavor "${{ needs.resolve-config.outputs.flavor }}" \
            --build-name "${{ steps.version.outputs.build_name }}" \
            --build-number "${{ steps.version.outputs.build_number }}" \
            --dart-define=APP_ENV="${{ needs.resolve-config.outputs.app_env }}" \
            --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Upload APK artifact
        if: ${{ inputs.build_type == 'apk' || inputs.build_type == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ needs.resolve-config.outputs.flavor }}-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload App Bundle artifact
        if: ${{ inputs.build_type == 'appbundle' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ needs.resolve-config.outputs.flavor }}-${{ github.sha }}
          path: build/app/outputs/bundle/**/*.aab
          retention-days: 30
  distribute-demo:
    name: Distribute demo (Firebase)
    needs: [ resolve-config, build-android ]
    if: ${{ inputs.distribute_firebase == true }}
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ needs.resolve-config.outputs.flavor }}-${{ github.sha }}
          path: ./apk

      - name: Write Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/firebase-sa.json"

      - name: Check secrets present
        run: |
          test -n "${{ secrets.FIREBASE_APP_ID }}" || { echo "FIREBASE_APP_ID vide"; exit 1; }
          test -s "$RUNNER_TEMP/firebase-sa.json" || { echo "JSON service account vide/absent"; exit 1; }
          echo "Secrets OK"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Distribute to Firebase App Distribution
        run: |
          APK=$(ls ./apk/*.apk | head -n1)
          echo "APK trouvé : $APK"
          firebase appdistribution:distribute "$APK" \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --service-credentials-file "$RUNNER_TEMP/firebase-sa.json" \
            --groups "demo-tablets" \
            --release-notes "Démo build ${{ github.run_number }}"

      - name: Cleanup secret
        if: always()
        run: rm -f "$RUNNER_TEMP/firebase-sa.json"
