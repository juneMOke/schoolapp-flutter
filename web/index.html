<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A school management App">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ETEELO CONNECT">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Couleur de marque (Bleu Profond) pour la chrome du navigateur. -->
  <meta name="theme-color" content="#0E2D42">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ETEELO CONNECT</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Couche W (spec §01) — pré-splash web. Affiche le même fond Bleu Profond +
    symbole (arc qui tourne) + progression que les couches native et Flutter,
    pour éviter le flash blanc avant le chargement de main.dart.js. Retiré par
    Dart (window.removeSplashLoader) au premier frame Flutter peint.
  -->
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background-color: #0E2D42; }
    #splash-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0E2D42;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    /* Symbole = min(38 % du petit côté, palier de la couche B) pour un raccord
       W→B sans saut de taille. Téléphone portrait = 112 ; tablette = 152 ;
       bureau = 180 ; téléphone paysage = 96 (plafond absolu spec : 200). */
    #splash-loader .symbol {
      width: min(38vmin, 112px);
      height: min(38vmin, 112px);
    }
    #splash-loader .bar {
      position: relative;
      margin-top: 32px;
      width: 96px;
      height: 4px;
      border-radius: 999px;
      background: rgba(250, 250, 247, 0.14);
      overflow: hidden;
    }
    /* Paliers responsive (après les règles de base pour les surcharger). */
    @media (min-width: 600px) and (max-width: 1023px) {
      #splash-loader .symbol { width: min(38vmin, 152px); height: min(38vmin, 152px); }
      #splash-loader .bar { width: 130px; }
    }
    @media (min-width: 1024px) {
      #splash-loader .symbol { width: min(38vmin, 180px); height: min(38vmin, 180px); }
      #splash-loader .bar { width: 150px; }
    }
    @media (orientation: landscape) and (max-height: 599px) {
      #splash-loader .symbol { width: min(38vmin, 96px); height: min(38vmin, 96px); }
      #splash-loader .bar { width: 96px; }
    }
    #splash-loader .bar::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 40%;
      border-radius: 3px;
      background: #D9A24E;
      animation: splash-indeterminate 1.1s ease-in-out infinite;
    }
    @keyframes splash-indeterminate {
      0%   { transform: translateX(-110%); }
      100% { transform: translateX(360%); }
    }
    /* L'arc Or Doux tourne autour du centre du symbole (1,4 s/tour) — même
       animation que la couche Flutter, pour une continuité de mouvement. */
    #splash-loader .symbol .arc {
      transform-box: view-box;
      transform-origin: 100px 100px;
      animation: splash-arc-spin 1.4s linear infinite;
    }
    @keyframes splash-arc-spin {
      to { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      #splash-loader .symbol .arc { animation: none; }
    }
  </style>
</head>
<body>
  <div id="splash-loader" aria-label="ETEELO CONNECT" role="img">
    <svg class="symbol" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
      <path class="arc" d="M 100 8 A 92 92 0 0 1 100 192" fill="none" stroke="#D9A24E" stroke-width="14" stroke-linecap="round"/>
      <circle cx="100" cy="100" r="72" fill="#FAFAF7"/>
      <g fill="#0E2D42">
        <rect x="71" y="60" width="16" height="80"/>
        <rect x="71" y="60" width="58" height="14"/>
        <rect x="71" y="93" width="44" height="14"/>
        <rect x="71" y="126" width="58" height="14"/>
      </g>
    </svg>
    <div class="bar"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Le retrait du pré-splash est piloté par Dart (addPostFrameCallback), donc
    // APRÈS le premier frame Flutter peint → raccord sans trou bleu. On expose
    // juste la fonction de disparition (idempotente), avec un filet de sécurité
    // si Dart ne démarre jamais.
    window.removeSplashLoader = function () {
      var loader = document.getElementById('splash-loader');
      if (!loader || loader.dataset.removing) return;
      loader.dataset.removing = '1';
      loader.style.opacity = '0';
      setTimeout(function () {
        if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
      }, 320);
    };
    setTimeout(window.removeSplashLoader, 10000);
  </script>
</body>
</html>
